meta:
  environment: node
  toolchain:
    name: npm
    version: "22"

build:
  additionalCommands: npm run build && node -e "require('fs').cpSync('.next/static','.next/standalone/.next/static',{recursive:true,force:true});require('fs').cpSync('public','.next/standalone/public',{recursive:true,force:true})"

run:
  command: HOST=0.0.0.0 node .next/standalone/server.js
  containerPort: 3000
  persistenceMount: /data
