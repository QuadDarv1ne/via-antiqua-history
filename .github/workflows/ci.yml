name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-build-${{ hashFiles('package-lock.json') }}
          restore-keys: next-build-
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          DB_PATH: /tmp/app.db
          JWT_SECRET: ci-secret
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
